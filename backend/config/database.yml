default: &default
  adapter: postgresql
  encoding: unicode
  host: db
  username: postgres
  password: password

  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: self_auth_app_development

test:
  <<: *default
  database: self_auth_app_test

production:
  <<: *default
  database: self_auth_app_production
  username: self_auth_app
  password: <%= ENV["SELF_AUTH_APP_DATABASE_PASSWORD"] %>
